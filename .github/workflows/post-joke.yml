name: AutoPost Bluesky Joke

on:
  schedule:
    # Runs at the start of every hour (e.g. 1:00, 2:00, etc.)
    - cron: '0 * * * *'
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  post-joke:
    runs-on: ubuntu-latest

    permissions:
      # Required to write/commit the updated jokes.json back to the repository
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Post Joke to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          POST_IMAGE: 'true'
          LOG_LEVEL: 'info'
          NODE_ENV: 'production'
        run: node scripts/post_github_action.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git status
          git diff src/data/jokes.json
          
          # Check if there are changes to commit
          if [[ -n "$(git status --porcelain src/data/jokes.json)" ]]; then
            echo "Changes detected in jokes.json. Committing back to repository..."
            git add src/data/jokes.json
            git commit -m "bot: auto-posted next joke [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to jokes.json detected."
          fi
